kind = "mobile"
previewPath = "/"
title = "WorkNest Mobile"
version = "1.0.0"
id = "artifacts/worknest-mobile"
router = "expo-domain"

[[integratedSkills]]
name = "expo"
version = "1.0.0"

[[services]]
ensurePreviewReachable = "/status"
name = "expo"
paths = [ "/" ]
localPort = 24947

[services.development]
run = "pnpm --filter @workspace/worknest-mobile run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/worknest-mobile", "run", "build" ]
run = [ "pnpm", "--filter", "@workspace/worknest-mobile", "run", "serve" ]

[services.env]
PORT = "24947"
BASE_PATH = "/"
